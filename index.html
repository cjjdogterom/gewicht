<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gewicht Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2d3148;
      --accent: #6c63ff;
      --accent2: #ff6b6b;
      --green: #43e97b;
      --yellow: #f7b731;
      --text: #e8eaf6;
      --muted: #8890b0;
      --radius: 14px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent); }

    .btn {
      padding: 10px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn.secondary { background: var(--surface2); border: 1px solid var(--border); }

    /* Stats row */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
    }

    .stat-card .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
    .stat-card .value { font-size: 1.8rem; font-weight: 700; }
    .stat-card .sub { font-size: 0.78rem; color: var(--muted); margin-top: 3px; }
    .stat-card.accent .value { color: var(--accent); }
    .stat-card.green .value { color: var(--green); }
    .stat-card.yellow .value { color: var(--yellow); }
    .stat-card.red .value { color: var(--accent2); }

    /* Progress bar */
    .progress-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
    }
    .progress-section h3 { font-size: 0.85rem; color: var(--muted); margin-bottom: 14px; text-transform: uppercase; letter-spacing: .6px; }
    .progress-row { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
    .progress-label { font-size: 0.85rem; width: 100px; color: var(--muted); }
    .progress-bar-wrap { flex: 1; background: var(--surface2); border-radius: 99px; height: 10px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 99px; transition: width .4s; }
    .progress-pct { font-size: 0.85rem; font-weight: 700; width: 48px; text-align: right; }

    /* Charts */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    @media (max-width: 768px) {
      .charts-grid { grid-template-columns: 1fr; }
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .chart-card h3 { font-size: 0.9rem; font-weight: 600; margin-bottom: 16px; }

    /* Time filter */
    .time-filter { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-btn {
      padding: 5px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      transition: all .15s;
    }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Table */
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
    }

    .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .table-header h3 { font-size: 0.9rem; font-weight: 600; }

    .data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .data-table th { text-align: left; padding: 8px 12px; color: var(--muted); font-weight: 500; font-size: 0.75rem; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); }
    .data-table td { padding: 10px 12px; border-bottom: 1px solid rgba(45,49,72,.5); }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--surface2); }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 0.75rem; font-weight: 600; }
    .badge.pos { background: rgba(67,233,123,.15); color: var(--green); }
    .badge.neg { background: rgba(255,107,107,.15); color: var(--accent2); }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      width: 360px;
      max-width: 95vw;
    }
    .modal h2 { font-size: 1.1rem; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
    .form-group input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 0.95rem;
    }
    .form-group input:focus { outline: none; border-color: var(--accent); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  </style>
</head>
<body>

<header>
  <h1>Gewicht <span>Tracker</span></h1>
  <button class="btn" onclick="openModal()">+ Meting toevoegen</button>
</header>

<div class="stats-grid" id="statsGrid"></div>

<div class="progress-section">
  <h3>Voortgang naar doel</h3>
  <div id="progressBars"></div>
</div>

<div class="time-filter" id="timeFilter">
  <button class="filter-btn" data-days="30" onclick="setFilter(30)">30 dagen</button>
  <button class="filter-btn" data-days="60" onclick="setFilter(60)">60 dagen</button>
  <button class="filter-btn active" data-days="0" onclick="setFilter(0)">Alles</button>
</div>

<div class="charts-grid">
  <div class="chart-card">
    <h3>Gewicht (kg)</h3>
    <canvas id="weightChart"></canvas>
  </div>
  <div class="chart-card">
    <h3>Vet % over tijd</h3>
    <canvas id="fatChart"></canvas>
  </div>
</div>

<div class="table-card">
  <div class="table-header">
    <h3>Metingen</h3>
    <span id="entryCount" style="color:var(--muted);font-size:.85rem;"></span>
  </div>
  <div style="overflow-x:auto">
    <table class="data-table" id="dataTable">
      <thead>
        <tr>
          <th>Datum</th>
          <th>Gewicht (kg)</th>
          <th>Voorspeld (kg)</th>
          <th>Verschil</th>
          <th>Vet %</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2>Nieuwe meting</h2>
    <div class="form-group">
      <label>Datum</label>
      <input type="date" id="inputDatum" />
    </div>
    <div class="form-group">
      <label>Gewicht (kg)</label>
      <input type="number" id="inputGewicht" step="0.1" placeholder="bv. 83.5" />
    </div>
    <div class="form-group">
      <label>Vet % (optioneel)</label>
      <input type="number" id="inputVet" step="0.1" placeholder="bv. 21.5" />
    </div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeModal()">Annuleren</button>
      <button class="btn" onclick="saveMeting()">Opslaan</button>
    </div>
  </div>
</div>

const DOEL_GEWICHT = 74;
const START_GEWICHT = 87;
const DOEL_VET = 16;
const START_VET = 25;
const EIND_DATUM = '2026-06-01';

let filterDays = 0;
let weightChart, fatChart;

function getData() {
  const extra = JSON.parse(localStorage.getItem('gewichtExtra') || '[]');
  const merged = [...HISTORISCH];
  extra.forEach(e => {
    if (!merged.find(m => m.datum === e.datum)) merged.push(e);
  });
  return merged.sort((a, b) => a.datum.localeCompare(b.datum));
}

function getFiltered() {
  const all = getData();
  if (!filterDays) return all;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - filterDays);
  return all.filter(d => new Date(d.datum) >= cutoff);
}

function formatDatum(d) {
  const [y, m, day] = d.split('-');
  return `${day}-${m}-${y}`;
}

function setFilter(days) {
  filterDays = days;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.days) === days);
  });
  render();
}

function renderStats() {
  const all = getData();
  const last = all[all.length - 1];
  const huidig = last.gewicht;
  const verloren = +(START_GEWICHT - huidig).toFixed(1);
  const nodig = +(huidig - DOEL_GEWICHT).toFixed(1);
  const vandaag = new Date();
  const eind = new Date(EIND_DATUM);
  const dagenOver = Math.max(0, Math.ceil((eind - vandaag) / 86400000));

  const gems = all.slice(-7).reduce((s, d) => s + d.gewicht, 0) / Math.min(7, all.length);

  const cards = [
    { label: 'Huidig gewicht', value: `${huidig} kg`, sub: formatDatum(last.datum), cls: 'accent' },
    { label: 'Verloren', value: `${verloren} kg`, sub: `van ${START_GEWICHT} kg`, cls: 'green' },
    { label: 'Nog te gaan', value: `${nodig} kg`, sub: `doel: ${DOEL_GEWICHT} kg`, cls: nodig < 5 ? 'green' : 'yellow' },
    { label: 'Vet %', value: last.vet_perc ? `${last.vet_perc}%` : '-', sub: `doel: ${DOEL_VET}%`, cls: 'accent' },
    { label: 'Dagen resterend', value: dagenOver, sub: `deadline: ${formatDatum(EIND_DATUM)}`, cls: dagenOver < 30 ? 'red' : 'yellow' },
    { label: '7-daags gem.', value: `${gems.toFixed(1)} kg`, sub: 'laatste week', cls: '' },
  ];

  document.getElementById('statsGrid').innerHTML = cards.map(c => `
    <div class="stat-card ${c.cls}">
      <div class="label">${c.label}</div>
      <div class="value">${c.value}</div>
      <div class="sub">${c.sub}</div>
    </div>`).join('');
}

function renderProgress() {
  const all = getData();
  const last = all[all.length - 1];
  const gewichtPct = Math.min(100, ((START_GEWICHT - last.gewicht) / (START_GEWICHT - DOEL_GEWICHT)) * 100);
  const vetPct = last.vet_perc ? Math.min(100, ((START_VET - last.vet_perc) / (START_VET - DOEL_VET)) * 100) : 0;

  const vandaag = new Date();
  const start = new Date('2025-09-29');
  const eind = new Date(EIND_DATUM);
  const tijdPct = Math.min(100, ((vandaag - start) / (eind - start)) * 100);

  const bars = [
    { label: 'Gewicht', pct: gewichtPct, color: '#6c63ff' },
    { label: 'Vet %', pct: vetPct, color: '#43e97b' },
    { label: 'Tijd', pct: tijdPct, color: '#f7b731' },
  ];

  document.getElementById('progressBars').innerHTML = bars.map(b => `
    <div class="progress-row">
      <div class="progress-label">${b.label}</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" style="width:${b.pct.toFixed(1)}%;background:${b.color}"></div>
      </div>
      <div class="progress-pct" style="color:${b.color}">${b.pct.toFixed(0)}%</div>
    </div>`).join('');
}

function renderCharts() {
  const data = getFiltered();
  const labels = data.map(d => formatDatum(d.datum));
  const actuals = data.map(d => d.gewicht);
  const predicted = data.map(d => d.voorspeld);
  const fatData = data.map(d => d.vet_perc);

  const goalLine = data.map(() => DOEL_GEWICHT);

  const chartDefaults = {
    responsive: true,
    maintainAspectRatio: true,
    plugins: { legend: { labels: { color: '#8890b0', font: { size: 11 }, boxWidth: 12 } } },
    scales: {
      x: { ticks: { color: '#8890b0', maxRotation: 45, font: { size: 10 }, maxTicksLimit: 10 }, grid: { color: 'rgba(45,49,72,.4)' } },
      y: { ticks: { color: '#8890b0', font: { size: 11 } }, grid: { color: 'rgba(45,49,72,.4)' } }
    }
  };

  if (weightChart) weightChart.destroy();
  weightChart = new Chart(document.getElementById('weightChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Werkelijk', data: actuals, borderColor: '#6c63ff', backgroundColor: 'rgba(108,99,255,.08)', tension: .3, pointRadius: 2, borderWidth: 2, fill: true },
        { label: 'Voorspeld', data: predicted, borderColor: '#f7b731', backgroundColor: 'transparent', tension: .3, pointRadius: 0, borderWidth: 1.5, borderDash: [5,4] },
        { label: 'Doel', data: goalLine, borderColor: '#43e97b', backgroundColor: 'transparent', pointRadius: 0, borderWidth: 1, borderDash: [3,6] },
      ]
    },
    options: { ...chartDefaults }
  });

  if (fatChart) fatChart.destroy();
  fatChart = new Chart(document.getElementById('fatChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Vet %', data: fatData, borderColor: '#ff6b6b', backgroundColor: 'rgba(255,107,107,.08)', tension: .3, pointRadius: 2, borderWidth: 2, fill: true, spanGaps: true },
        { label: 'Doel', data: data.map(() => DOEL_VET), borderColor: '#43e97b', backgroundColor: 'transparent', pointRadius: 0, borderWidth: 1, borderDash: [3,6] },
      ]
    },
    options: { ...chartDefaults }
  });
}

function renderTable() {
  const data = [...getData()].reverse().slice(0, 30);
  document.getElementById('entryCount').textContent = `${getData().length} metingen`;
  document.getElementById('tableBody').innerHTML = data.map(d => {
    const diff = d.voorspeld ? (d.gewicht - d.voorspeld).toFixed(2) : null;
    const diffBadge = diff !== null
      ? `<span class="badge ${parseFloat(diff) <= 0 ? 'pos' : 'neg'}">${parseFloat(diff) > 0 ? '+' : ''}${diff}</span>`
      : '-';
    return `<tr>
      <td>${formatDatum(d.datum)}</td>
      <td><strong>${d.gewicht}</strong></td>
      <td>${d.voorspeld ?? '-'}</td>
      <td>${diffBadge}</td>
      <td>${d.vet_perc !== null ? d.vet_perc + '%' : '-'}</td>
    </tr>`;
  }).join('');
}

function render() {
  renderStats();
  renderProgress();
  renderCharts();
  renderTable();
}

function openModal() {
  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('inputDatum').value = today;
  document.getElementById('inputGewicht').value = '';
  document.getElementById('inputVet').value = '';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function saveMeting() {
  const datum = document.getElementById('inputDatum').value;
  const gewicht = parseFloat(document.getElementById('inputGewicht').value);
  const vet = document.getElementById('inputVet').value ? parseFloat(document.getElementById('inputVet').value) : null;

  if (!datum || isNaN(gewicht)) {
    alert('Vul datum en gewicht in.');
    return;
  }

  const extra = JSON.parse(localStorage.getItem('gewichtExtra') || '[]');
  const existing = extra.findIndex(e => e.datum === datum);
  const entry = { datum, gewicht, voorspeld: null, vet_perc: vet };
  if (existing >= 0) extra[existing] = entry;
  else extra.push(entry);
  localStorage.setItem('gewichtExtra', JSON.stringify(extra));

  closeModal();
  render();
}

render();
</script>
</body>
</html>
