<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gewicht Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #2e8b57;
      --green-light: #4caf7d;
      --green-pale: #e8f5ee;
      --green-pale2: #d4eddf;
      --blue: #1a6fa8;
      --orange: #c95d00;
      --danger: #c0392b;
      --text: #1c3a2a;
      --text2: #4a7060;
      --muted: #7a9e8a;
      --border: #c8e3d4;
      --surface: #ffffff;
      --radius: 16px;
      --shadow: 0 2px 12px rgba(46,139,87,.08);
      --shadow-md: 0 4px 24px rgba(46,139,87,.12);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(160deg, #f0faf4 0%, #e8f5ee 40%, #f5fbf7 100%);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      padding: 24px 20px 40px;
    }

    /* Header */
    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px; flex-wrap: wrap; gap: 12px;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(135deg, var(--green), var(--green-light));
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 1.2rem; box-shadow: 0 2px 8px rgba(46,139,87,.3);
    }
    header h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; color: var(--text); }
    header h1 span { color: var(--green); }
    .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .btn {
      padding: 9px 18px; border: none; border-radius: 10px; cursor: pointer;
      font-size: 0.875rem; font-weight: 600; transition: all .15s; white-space: nowrap;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--green), var(--green-light));
      color: #fff; box-shadow: 0 2px 8px rgba(46,139,87,.3);
    }
    .btn-primary:hover { box-shadow: 0 4px 16px rgba(46,139,87,.4); transform: translateY(-1px); }
    .btn-secondary { background: rgba(255,255,255,.8); border: 1px solid var(--border); color: var(--text2); backdrop-filter: blur(4px); }
    .btn-secondary:hover { background: #fff; border-color: var(--green); color: var(--green); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

    .db-pill {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,.7); border: 1px solid var(--border);
      border-radius: 99px; padding: 4px 10px 4px 6px; font-size: 0.75rem;
      color: var(--muted); backdrop-filter: blur(4px);
    }
    .db-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; }
    .db-dot.ok { background: var(--green); box-shadow: 0 0 0 3px rgba(46,139,87,.2); }
    .db-dot.err { background: var(--danger); }

    /* Stats grid */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 14px; margin-bottom: 20px;
    }
    .stat-card {
      background: var(--surface); border-radius: var(--radius);
      padding: 18px 20px; box-shadow: var(--shadow);
      border: 1px solid rgba(200,227,212,.6);
      position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .stat-card.green::before { background: linear-gradient(90deg, var(--green), var(--green-light)); }
    .stat-card.blue::before { background: linear-gradient(90deg, var(--blue), #3498db); }
    .stat-card.orange::before { background: linear-gradient(90deg, var(--orange), #e67e22); }
    .stat-card .label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 8px; font-weight: 600; }
    .stat-card .value { font-size: 1.7rem; font-weight: 800; line-height: 1; margin-bottom: 4px; }
    .stat-card.green .value { color: var(--green); }
    .stat-card.blue .value { color: var(--blue); }
    .stat-card.orange .value { color: var(--orange); }
    .stat-card .sub { font-size: 0.76rem; color: var(--muted); }

    /* Progress */
    .section-card {
      background: var(--surface); border-radius: var(--radius);
      padding: 22px 24px; box-shadow: var(--shadow);
      border: 1px solid rgba(200,227,212,.6); margin-bottom: 20px;
    }
    .section-title {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .8px; color: var(--muted); margin-bottom: 16px;
    }
    .progress-row { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
    .progress-row:last-child { margin-bottom: 0; }
    .progress-label { font-size: 0.82rem; width: 90px; color: var(--text2); font-weight: 500; }
    .progress-track { flex: 1; background: var(--green-pale); border-radius: 99px; height: 8px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 99px; transition: width .5s cubic-bezier(.4,0,.2,1); }
    .progress-pct { font-size: 0.82rem; font-weight: 700; width: 42px; text-align: right; }

    /* Charts */
    .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    @media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } }

    .time-filter { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .filter-btn {
      padding: 5px 14px; background: rgba(255,255,255,.7); border: 1px solid var(--border);
      border-radius: 99px; color: var(--muted); cursor: pointer; font-size: 0.78rem;
      font-weight: 500; transition: all .15s; backdrop-filter: blur(4px);
    }
    .filter-btn.active { background: var(--green); border-color: var(--green); color: #fff; box-shadow: 0 2px 8px rgba(46,139,87,.25); }

    /* Table */
    .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .table-header h3 { font-size: 0.95rem; font-weight: 700; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    .data-table th { text-align: left; padding: 8px 14px; color: var(--muted); font-weight: 600; font-size: 0.7rem; text-transform: uppercase; letter-spacing: .6px; border-bottom: 1px solid var(--border); }
    .data-table td { padding: 11px 14px; border-bottom: 1px solid rgba(200,227,212,.5); }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tbody tr:hover td { background: var(--green-pale); }
    .badge { display: inline-flex; align-items: center; padding: 2px 9px; border-radius: 99px; font-size: 0.73rem; font-weight: 700; }
    .badge.pos { background: rgba(46,139,87,.1); color: var(--green); }
    .badge.neg { background: rgba(201,93,0,.1); color: var(--orange); }

    /* Modals */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(28,58,42,.4); backdrop-filter: blur(6px);
      z-index: 100; align-items: center; justify-content: center; padding: 16px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border-radius: 20px;
      padding: 28px 28px 24px; width: 100%; max-width: 420px;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(28,58,42,.2);
      border: 1px solid rgba(200,227,212,.8);
    }
    .modal.wide { max-width: 560px; }
    .modal h2 { font-size: 1.15rem; font-weight: 800; margin-bottom: 22px; color: var(--text); }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.76rem; color: var(--muted); margin-bottom: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
    .form-group input {
      width: 100%; background: var(--green-pale);
      border: 1.5px solid var(--border); border-radius: 10px;
      padding: 10px 13px; color: var(--text); font-size: 0.92rem;
      transition: border-color .15s;
    }
    .form-group input:focus { outline: none; border-color: var(--green); background: #fff; }
    .form-section {
      font-size: 0.7rem; color: var(--muted); text-transform: uppercase;
      letter-spacing: .7px; font-weight: 700; margin: 20px 0 10px;
      padding-bottom: 7px; border-bottom: 1px solid var(--border);
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }
    .modal-actions-split { display: flex; justify-content: space-between; align-items: center; margin-top: 22px; flex-wrap: wrap; gap: 10px; }

    .tdee-box {
      background: linear-gradient(135deg, var(--green-pale), #f0faf4);
      border: 1px solid var(--green-pale2); border-radius: 12px;
      padding: 14px 16px; margin-top: 8px;
    }
    .tdee-row { display: flex; justify-content: space-between; font-size: 0.84rem; padding: 3px 0; color: var(--text2); }
    .tdee-row.total { font-weight: 800; border-top: 1px solid var(--border); margin-top: 8px; padding-top: 10px; color: var(--green); font-size: 0.92rem; }

    .skeleton { background: linear-gradient(90deg, var(--green-pale) 25%, #f0faf4 50%, var(--green-pale) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; height: 80px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚖</div>
    <h1>Gewicht <span>Tracker</span></h1>
  </div>
  <div class="header-actions">
    <div class="db-pill"><div class="db-dot" id="dbDot"></div><span id="dbLabel">verbinden…</span></div>
    <button class="btn btn-secondary" onclick="openInstellingen()">⚙ Instellingen</button>
    <button class="btn btn-primary" onclick="openMeting()">+ Meting</button>
  </div>
</header>

<div class="stats-grid" id="statsGrid">
  <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
  <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
</div>

<div class="section-card">
  <div class="section-title">Voortgang naar doel</div>
  <div id="progressBars"></div>
</div>

<div class="time-filter">
  <button class="filter-btn" data-days="30" onclick="setFilter(30)">30 dagen</button>
  <button class="filter-btn" data-days="60" onclick="setFilter(60)">60 dagen</button>
  <button class="filter-btn active" data-days="0" onclick="setFilter(0)">Alles</button>
</div>

<div class="charts-grid">
  <div class="section-card" style="margin-bottom:0"><h3 style="font-size:.9rem;font-weight:700;margin-bottom:16px">Gewicht (kg)</h3><canvas id="weightChart"></canvas></div>
  <div class="section-card" style="margin-bottom:0"><h3 style="font-size:.9rem;font-weight:700;margin-bottom:16px">Vet % over tijd</h3><canvas id="fatChart"></canvas></div>
</div>

<div class="section-card" style="margin-top:16px">
  <div class="table-header">
    <h3>Metingen</h3>
    <span id="entryCount" style="color:var(--muted);font-size:.82rem;"></span>
  </div>
  <div style="overflow-x:auto">
    <table class="data-table">
      <thead><tr><th>Datum</th><th>Gewicht</th><th>Voorspeld</th><th>Verschil</th><th>Vet %</th></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<!-- Meting modal -->
<div class="modal-overlay" id="metingOverlay" onclick="closeOnOutside(event,'metingOverlay')">
  <div class="modal">
    <h2>Nieuwe meting</h2>
    <div class="form-group"><label>Datum</label><input type="date" id="inputDatum" /></div>
    <div class="form-group"><label>Gewicht (kg)</label><input type="number" id="inputGewicht" step="0.1" placeholder="bv. 83.5" /></div>
    <div class="form-group"><label>Vet % <span style="font-weight:400;text-transform:none">(optioneel)</span></label><input type="number" id="inputVet" step="0.1" placeholder="bv. 21.5" /></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('metingOverlay')">Annuleren</button>
      <button class="btn btn-primary" id="btnSaveMeting" onclick="saveMeting()">Opslaan</button>
    </div>
  </div>
</div>

<!-- Instellingen modal -->
<div class="modal-overlay" id="instellingenOverlay" onclick="closeOnOutside(event,'instellingenOverlay')">
  <div class="modal wide">
    <h2>Instellingen</h2>
    <div class="form-section">Gewicht &amp; doelen</div>
    <div class="form-row">
      <div class="form-group"><label>Begingewicht (kg)</label><input type="number" id="sBeginGewicht" step="0.1" /></div>
      <div class="form-group"><label>Streefgewicht (kg)</label><input type="number" id="sStreefGewicht" step="0.1" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Begin vet %</label><input type="number" id="sBeginVet" step="0.1" /></div>
      <div class="form-group"><label>Doel vet %</label><input type="number" id="sDoelVet" step="0.1" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Begindatum</label><input type="date" id="sBeginDatum" /></div>
      <div class="form-group"><label>Einddatum (deadline)</label><input type="date" id="sEindDatum" /></div>
    </div>
    <div class="form-section">Energieverbruik (TDEE)</div>
    <div class="form-row">
      <div class="form-group"><label>BMR – rustverbranding (kcal)</label><input type="number" id="sBmr" step="1" /></div>
      <div class="form-group"><label>EAT – sport (kcal)</label><input type="number" id="sEat" step="1" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>NEAT – dagelijkse beweging</label><input type="number" id="sNeat" step="1" /></div>
      <div class="form-group"><label>TEF – spijsvertering (kcal)</label><input type="number" id="sTef" step="1" /></div>
    </div>
    <div class="tdee-box" id="tdeeDisplay"></div>
    <div class="modal-actions-split">
      <button class="btn btn-danger" onclick="verwijderAlleData()">🗑 Verwijder alle data</button>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" onclick="closeModal('instellingenOverlay')">Annuleren</button>
        <button class="btn btn-primary" id="btnSaveSettings" onclick="saveInstellingen()">Opslaan</button>
      </div>
    </div>
  </div>
</div>

<script>
const DB_URL   = 'https://gewicht-cjjdogterom.aws-ap-northeast-1.turso.io';
const DB_TOKEN = 'eyJhbGciOiJFZERTQSIsInR5cCI6IkpXVCJ9.eyJhIjoicnciLCJpYXQiOjE3ODA1NTYwMDMsImlkIjoiMDE5ZTkxNjgtNWYwMS03ZTYwLTg4MTctN2QwYzdmMWJlY2FmIiwicmlkIjoiMGMwZjM0MTgtMDNhYy00MWNkLWJiMjktMjNlYjVjZjUwODFlIn0.isB23ohlqDeXCWbO218I-a_nMyAQ8XeWJ8JeIpM7l1vwBBrne_wOGzAeVYklCL82MEBukd5sHfdou48-6TwlCQ';
const DEFAULTS = { beginGewicht:87, streefGewicht:74, beginVet:25, doelVet:16, beginDatum:'2025-09-29', eindDatum:'2026-06-01', bmr:1770, eat:415, neat:350, tef:170 };

let cachedData = [], cachedSettings = null, filterDays = 0, weightChart, fatChart;

async function turso(requests) {
  const res = await fetch(`${DB_URL}/v2/pipeline`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${DB_TOKEN}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ requests: [...requests, { type: 'close' }] })
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  const errs = json.results.filter(r => r.type === 'error');
  if (errs.length) throw new Error(errs[0].error?.message || 'DB fout');
  return json.results;
}

function rowsToObjs(result) {
  const cols = result.response.result.cols.map(c => c.name);
  return result.response.result.rows.map(row =>
    Object.fromEntries(cols.map((c, i) => [c, row[i]?.value ?? null]))
  );
}

async function loadData() {
  const [mRes, sRes] = await turso([
    { type: 'execute', stmt: { sql: 'SELECT datum, gewicht, vet_perc FROM metingen ORDER BY datum' } },
    { type: 'execute', stmt: { sql: 'SELECT sleutel, waarde FROM instellingen' } }
  ]);
  cachedData = rowsToObjs(mRes).map(r => ({
    datum: r.datum,
    gewicht: parseFloat(r.gewicht),
    vet_perc: r.vet_perc != null ? parseFloat(r.vet_perc) : null
  }));
  const saved = Object.fromEntries(rowsToObjs(sRes).map(r => [r.sleutel, isNaN(r.waarde) ? r.waarde : parseFloat(r.waarde)]));
  cachedSettings = { ...DEFAULTS, ...saved };
  document.getElementById('dbDot').className = 'db-dot ok';
  document.getElementById('dbLabel').textContent = 'Verbonden';
}

function getS() { return cachedSettings || DEFAULTS; }

// Doellijn: lineair van beginGewicht (op beginDatum) naar streefGewicht (op eindDatum)
function voorspeld(datumStr) {
  const s  = getS();
  const t0 = new Date(s.beginDatum).getTime();
  const t1 = new Date(s.eindDatum).getTime();
  const t  = new Date(datumStr).getTime();
  const pct = (t - t0) / (t1 - t0);
  return +(s.beginGewicht + pct * (s.streefGewicht - s.beginGewicht)).toFixed(2);
}

function getFiltered() {
  if (!filterDays) return cachedData;
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - filterDays);
  return cachedData.filter(d => new Date(d.datum) >= cutoff);
}

function fmt(d) { const [y,m,day] = d.split('-'); return `${day}-${m}-${y}`; }

function setFilter(days) {
  filterDays = days;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.days) === days));
  renderCharts(); renderTable();
}

function renderStats() {
  const s = getS(), last = cachedData[cachedData.length - 1];
  if (!last) return;
  const verloren  = +(s.beginGewicht - last.gewicht).toFixed(1);
  const nodig     = +(last.gewicht - s.streefGewicht).toFixed(1);
  const dagenOver = Math.max(0, Math.ceil((new Date(s.eindDatum) - new Date()) / 86400000));
  const tdee      = s.bmr + s.eat + s.neat + s.tef;
  const gems      = cachedData.slice(-7).reduce((a,d) => a + d.gewicht, 0) / Math.min(7, cachedData.length);

  document.getElementById('statsGrid').innerHTML = [
    { label: 'Huidig gewicht', value: `${last.gewicht} kg`, sub: fmt(last.datum), cls: 'green' },
    { label: 'Verloren',       value: `${verloren} kg`,     sub: `van ${s.beginGewicht} kg`, cls: 'green' },
    { label: 'Nog te gaan',    value: `${nodig} kg`,        sub: `doel: ${s.streefGewicht} kg`, cls: nodig < 5 ? 'green' : 'orange' },
    { label: 'Vet %',          value: last.vet_perc ? `${last.vet_perc}%` : '–', sub: `doel: ${s.doelVet}%`, cls: 'blue' },
    { label: 'Dagen resterend',value: dagenOver,             sub: fmt(s.eindDatum), cls: 'orange' },
    { label: 'TDEE',           value: tdee,                  sub: 'kcal/dag', cls: 'blue' },
    { label: '7-daags gem.',   value: `${gems.toFixed(1)} kg`, sub: 'laatste week', cls: '' },
  ].map(c => `
    <div class="stat-card ${c.cls}">
      <div class="label">${c.label}</div>
      <div class="value">${c.value}</div>
      <div class="sub">${c.sub}</div>
    </div>`).join('');
}

function renderProgress() {
  const s = getS(), last = cachedData[cachedData.length - 1];
  if (!last) return;
  const gwPct  = Math.min(100, ((s.beginGewicht - last.gewicht) / (s.beginGewicht - s.streefGewicht)) * 100);
  const vetPct = last.vet_perc ? Math.min(100, ((s.beginVet - last.vet_perc) / (s.beginVet - s.doelVet)) * 100) : 0;
  const tijdPct = Math.min(100, ((new Date() - new Date(s.beginDatum)) / (new Date(s.eindDatum) - new Date(s.beginDatum))) * 100);
  document.getElementById('progressBars').innerHTML = [
    { label:'Gewicht', pct:gwPct,   color:'var(--green)', grad:'linear-gradient(90deg,#2e8b57,#4caf7d)' },
    { label:'Vet %',   pct:vetPct,  color:'var(--blue)',  grad:'linear-gradient(90deg,#1a6fa8,#3498db)' },
    { label:'Tijd',    pct:tijdPct, color:'var(--orange)',grad:'linear-gradient(90deg,#c95d00,#e67e22)' },
  ].map(b => `
    <div class="progress-row">
      <div class="progress-label">${b.label}</div>
      <div class="progress-track"><div class="progress-fill" style="width:${b.pct.toFixed(1)}%;background:${b.grad}"></div></div>
      <div class="progress-pct" style="color:${b.color}">${b.pct.toFixed(0)}%</div>
    </div>`).join('');
}

function renderCharts() {
  const s    = getS();
  const data = getFiltered();
  const labels = data.map(d => fmt(d.datum));
  const voorspeldLijn = data.map(d => voorspeld(d.datum));

  const opts = {
    responsive: true, maintainAspectRatio: true,
    plugins: { legend: { labels: { color: '#7a9e8a', font: { size: 11 }, boxWidth: 12, padding: 16 } } },
    scales: {
      x: { ticks: { color: '#7a9e8a', maxRotation: 40, font: { size: 10 }, maxTicksLimit: 10 }, grid: { color: 'rgba(200,227,212,.4)' }, border: { color: 'rgba(200,227,212,.4)' } },
      y: { ticks: { color: '#7a9e8a', font: { size: 11 } }, grid: { color: 'rgba(200,227,212,.4)' }, border: { color: 'rgba(200,227,212,.4)' } }
    }
  };

  if (weightChart) weightChart.destroy();
  weightChart = new Chart(document.getElementById('weightChart'), {
    type: 'line',
    data: { labels, datasets: [
      { label:'Werkelijk', data: data.map(d => d.gewicht), borderColor:'#2e8b57', backgroundColor:'rgba(46,139,87,.07)', tension:.35, pointRadius:2.5, pointBackgroundColor:'#2e8b57', borderWidth:2, fill:true },
      { label:'Doellijn',  data: voorspeldLijn, borderColor:'#c95d00', backgroundColor:'transparent', tension:0, pointRadius:0, borderWidth:2, borderDash:[6,4] },
    ]},
    options: opts
  });

  if (fatChart) fatChart.destroy();
  fatChart = new Chart(document.getElementById('fatChart'), {
    type: 'line',
    data: { labels, datasets: [
      { label:'Vet %', data: data.map(d => d.vet_perc), borderColor:'#1a6fa8', backgroundColor:'rgba(26,111,168,.07)', tension:.35, pointRadius:2.5, pointBackgroundColor:'#1a6fa8', borderWidth:2, fill:true, spanGaps:true },
      { label:'Doel',  data: data.map(() => s.doelVet), borderColor:'#c95d00', backgroundColor:'transparent', pointRadius:0, borderWidth:1.5, borderDash:[3,6] },
    ]},
    options: opts
  });
}

function renderTable() {
  document.getElementById('entryCount').textContent = `${cachedData.length} metingen`;
  document.getElementById('tableBody').innerHTML = [...cachedData].reverse().slice(0,30).map(d => {
    const vw   = voorspeld(d.datum);
    const diff = (d.gewicht - vw).toFixed(2);
    const badge = `<span class="badge ${parseFloat(diff) <= 0 ? 'pos' : 'neg'}">${parseFloat(diff) > 0 ? '+' : ''}${diff}</span>`;
    return `<tr><td>${fmt(d.datum)}</td><td><strong>${d.gewicht}</strong></td><td>${vw}</td><td>${badge}</td><td>${d.vet_perc != null ? d.vet_perc + '%' : '–'}</td></tr>`;
  }).join('');
}

function render() { renderStats(); renderProgress(); renderCharts(); renderTable(); }

/* Meting */
function openMeting() {
  document.getElementById('inputDatum').value   = new Date().toISOString().slice(0,10);
  document.getElementById('inputGewicht').value = '';
  document.getElementById('inputVet').value     = '';
  document.getElementById('metingOverlay').classList.add('open');
}

async function saveMeting() {
  const datum   = document.getElementById('inputDatum').value;
  const gewicht = parseFloat(document.getElementById('inputGewicht').value);
  const vet     = document.getElementById('inputVet').value ? parseFloat(document.getElementById('inputVet').value) : null;
  if (!datum || isNaN(gewicht)) { alert('Vul datum en gewicht in.'); return; }
  const btn = document.getElementById('btnSaveMeting');
  btn.disabled = true; btn.textContent = 'Opslaan…';
  try {
    await turso([{ type:'execute', stmt:{ sql:'INSERT OR REPLACE INTO metingen (datum,gewicht,vet_perc) VALUES (?,?,?)',
      args:[{type:'text',value:datum},{type:'float',value:gewicht}, vet!=null?{type:'float',value:vet}:{type:'null'}] }}]);
    closeModal('metingOverlay');
    await loadData(); render();
  } catch(e) { alert('Fout: ' + e.message); }
  finally { btn.disabled=false; btn.textContent='Opslaan'; }
}

/* Instellingen */
function updateTdee() {
  const [bmr,eat,neat,tef] = ['sBmr','sEat','sNeat','sTef'].map(id => parseFloat(document.getElementById(id).value)||0);
  document.getElementById('tdeeDisplay').innerHTML = `
    <div class="tdee-row"><span>BMR</span><span>${bmr} kcal</span></div>
    <div class="tdee-row"><span>EAT (sport)</span><span>${eat} kcal</span></div>
    <div class="tdee-row"><span>NEAT (beweging)</span><span>${neat} kcal</span></div>
    <div class="tdee-row"><span>TEF (spijsvertering)</span><span>${tef} kcal</span></div>
    <div class="tdee-row total"><span>TDEE totaal</span><span>${bmr+eat+neat+tef} kcal/dag</span></div>`;
}

function openInstellingen() {
  const s = getS();
  const map = { sBeginGewicht:'beginGewicht', sStreefGewicht:'streefGewicht', sBeginVet:'beginVet', sDoelVet:'doelVet', sBeginDatum:'beginDatum', sEindDatum:'eindDatum', sBmr:'bmr', sEat:'eat', sNeat:'neat', sTef:'tef' };
  Object.entries(map).forEach(([id,key]) => { document.getElementById(id).value = s[key]; });
  updateTdee();
  ['sBmr','sEat','sNeat','sTef'].forEach(id => document.getElementById(id).oninput = updateTdee);
  document.getElementById('instellingenOverlay').classList.add('open');
}

async function saveInstellingen() {
  const map = { beginGewicht:'sBeginGewicht', streefGewicht:'sStreefGewicht', beginVet:'sBeginVet', doelVet:'sDoelVet', beginDatum:'sBeginDatum', eindDatum:'sEindDatum', bmr:'sBmr', eat:'sEat', neat:'sNeat', tef:'sTef' };
  const btn = document.getElementById('btnSaveSettings');
  btn.disabled=true; btn.textContent='Opslaan…';
  try {
    await turso(Object.entries(map).map(([key,id]) => ({ type:'execute', stmt:{ sql:'INSERT OR REPLACE INTO instellingen (sleutel,waarde) VALUES (?,?)',
      args:[{type:'text',value:key},{type:'text',value:document.getElementById(id).value}] }})));
    closeModal('instellingenOverlay');
    await loadData(); render();
  } catch(e) { alert('Fout: ' + e.message); }
  finally { btn.disabled=false; btn.textContent='Opslaan'; }
}

async function verwijderAlleData() {
  if (!confirm('Weet je zeker dat je ALLE metingen wilt verwijderen?')) return;
  try {
    await turso([{ type:'execute', stmt:{ sql:'DELETE FROM metingen' } }]);
    closeModal('instellingenOverlay');
    await loadData(); render();
  } catch(e) { alert('Fout: ' + e.message); }
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeOnOutside(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }

loadData()
  .then(() => render())
  .catch(e => {
    document.getElementById('dbDot').className = 'db-dot err';
    document.getElementById('dbLabel').textContent = 'Offline';
    document.getElementById('statsGrid').innerHTML = `<div style="grid-column:1/-1;padding:20px;color:var(--danger);font-size:.9rem">Database niet bereikbaar: ${e.message}</div>`;
  });
</script>
</body>
</html>
