<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gewicht Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f7f5;
      --surface: #ffffff;
      --surface2: #eef4ee;
      --border: #d0e4d0;
      --accent: #2e8b57;
      --blue: #1a6fa8;
      --orange: #c95d00;
      --danger: #c0392b;
      --text: #1a2e1a;
      --muted: #6b8a6b;
      --radius: 14px;
    }

    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }

    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 10px; }
    header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent); }
    .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .btn { padding: 9px 18px; background: var(--accent); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 0.875rem; font-weight: 600; transition: opacity .15s; white-space: nowrap; }
    .btn:hover { opacity: .85; }
    .btn.secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
    .btn.blue { background: var(--blue); }
    .btn.danger { background: var(--danger); }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
    .stat-card .label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
    .stat-card .value { font-size: 1.75rem; font-weight: 700; }
    .stat-card .sub { font-size: 0.78rem; color: var(--muted); margin-top: 3px; }
    .stat-card.green .value { color: var(--accent); }
    .stat-card.blue .value { color: var(--blue); }
    .stat-card.orange .value { color: var(--orange); }

    .progress-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 24px; }
    .progress-section h3 { font-size: 0.8rem; color: var(--muted); margin-bottom: 14px; text-transform: uppercase; letter-spacing: .6px; }
    .progress-row { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
    .progress-label { font-size: 0.85rem; width: 100px; color: var(--muted); }
    .progress-bar-wrap { flex: 1; background: var(--surface2); border-radius: 99px; height: 10px; overflow: hidden; }
    .progress-bar-fill { height: 100%; border-radius: 99px; transition: width .4s; }
    .progress-pct { font-size: 0.85rem; font-weight: 700; width: 48px; text-align: right; }

    .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    @media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } }
    .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .chart-card h3 { font-size: 0.9rem; font-weight: 600; margin-bottom: 16px; }

    .time-filter { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-btn { padding: 5px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); cursor: pointer; font-size: 0.8rem; transition: all .15s; }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 24px; }
    .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .table-header h3 { font-size: 0.9rem; font-weight: 600; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .data-table th { text-align: left; padding: 8px 12px; color: var(--muted); font-weight: 500; font-size: 0.72rem; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); }
    .data-table td { padding: 10px 12px; border-bottom: 1px solid rgba(208,228,208,.8); }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--surface2); }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 0.75rem; font-weight: 600; }
    .badge.pos { background: rgba(46,139,87,.12); color: var(--accent); }
    .badge.neg { background: rgba(201,93,0,.12); color: var(--orange); }

    /* Modals */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto; }
    .modal.wide { max-width: 560px; }
    .modal h2 { font-size: 1.1rem; margin-bottom: 20px; }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 5px; font-weight: 500; }
    .form-group input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 13px; color: var(--text); font-size: 0.92rem; }
    .form-group input:focus { outline: none; border-color: var(--accent); }

    .form-section { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin: 18px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; flex-wrap: wrap; }
    .modal-actions-split { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; flex-wrap: wrap; gap: 10px; }

    .tdee-display { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-top: 6px; }
    .tdee-display .tdee-row { display: flex; justify-content: space-between; font-size: 0.85rem; padding: 3px 0; }
    .tdee-display .tdee-row.total { font-weight: 700; border-top: 1px solid var(--border); margin-top: 6px; padding-top: 8px; color: var(--accent); }
  </style>
</head>
<body>

<header>
  <h1>Gewicht <span>Tracker</span></h1>
  <div class="header-actions">
    <button class="btn secondary" onclick="openInstellingen()">⚙ Instellingen</button>
    <button class="btn" onclick="openMeting()">+ Meting toevoegen</button>
  </div>
</header>

<div class="stats-grid" id="statsGrid"></div>

<div class="progress-section">
  <h3>Voortgang naar doel</h3>
  <div id="progressBars"></div>
</div>

<div class="time-filter">
  <button class="filter-btn" data-days="30" onclick="setFilter(30)">30 dagen</button>
  <button class="filter-btn" data-days="60" onclick="setFilter(60)">60 dagen</button>
  <button class="filter-btn active" data-days="0" onclick="setFilter(0)">Alles</button>
</div>

<div class="charts-grid">
  <div class="chart-card"><h3>Gewicht (kg)</h3><canvas id="weightChart"></canvas></div>
  <div class="chart-card"><h3>Vet % over tijd</h3><canvas id="fatChart"></canvas></div>
</div>

<div class="table-card">
  <div class="table-header">
    <h3>Metingen</h3>
    <span id="entryCount" style="color:var(--muted);font-size:.85rem;"></span>
  </div>
  <div style="overflow-x:auto">
    <table class="data-table">
      <thead><tr><th>Datum</th><th>Gewicht (kg)</th><th>Voorspeld (kg)</th><th>Verschil</th><th>Vet %</th></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<!-- Meting modal -->
<div class="modal-overlay" id="metingOverlay" onclick="closeOnOutside(event,'metingOverlay')">
  <div class="modal">
    <h2>Nieuwe meting</h2>
    <div class="form-group"><label>Datum</label><input type="date" id="inputDatum" /></div>
    <div class="form-group"><label>Gewicht (kg)</label><input type="number" id="inputGewicht" step="0.1" placeholder="bv. 83.5" /></div>
    <div class="form-group"><label>Vet % (optioneel)</label><input type="number" id="inputVet" step="0.1" placeholder="bv. 21.5" /></div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeModal('metingOverlay')">Annuleren</button>
      <button class="btn" onclick="saveMeting()">Opslaan</button>
    </div>
  </div>
</div>

<!-- Instellingen modal -->
<div class="modal-overlay" id="instellingenOverlay" onclick="closeOnOutside(event,'instellingenOverlay')">
  <div class="modal wide">
    <h2>Instellingen</h2>

    <div class="form-section">Gewicht &amp; doelen</div>
    <div class="form-row">
      <div class="form-group"><label>Begingewicht (kg)</label><input type="number" id="sBeginGewicht" step="0.1" /></div>
      <div class="form-group"><label>Streefgewicht (kg)</label><input type="number" id="sStreefGewicht" step="0.1" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Begin vet % </label><input type="number" id="sBeginVet" step="0.1" /></div>
      <div class="form-group"><label>Doel vet %</label><input type="number" id="sDoelVet" step="0.1" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Begindatum</label><input type="date" id="sBeginDatum" /></div>
      <div class="form-group"><label>Einddatum (deadline)</label><input type="date" id="sEindDatum" /></div>
    </div>

    <div class="form-section">Energieverbruik (TDEE)</div>
    <div class="form-row">
      <div class="form-group"><label>BMR – rustverbranding (kcal)</label><input type="number" id="sBmr" step="1" /></div>
      <div class="form-group"><label>EAT – sport (kcal)</label><input type="number" id="sEat" step="1" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>NEAT – dagelijkse beweging (kcal)</label><input type="number" id="sNeat" step="1" /></div>
      <div class="form-group"><label>TEF – spijsvertering (kcal)</label><input type="number" id="sTef" step="1" /></div>
    </div>
    <div class="tdee-display" id="tdeeDisplay"></div>

    <div class="modal-actions-split">
      <button class="btn danger" onclick="verwijderAlleData()">🗑 Verwijder alle data</button>
      <div style="display:flex;gap:8px">
        <button class="btn secondary" onclick="closeModal('instellingenOverlay')">Annuleren</button>
        <button class="btn" onclick="saveInstellingen()">Opslaan</button>
      </div>
    </div>
  </div>
</div>

const DEFAULTS = { beginGewicht:87, streefGewicht:74, beginVet:25, doelVet:16, beginDatum:'2025-09-29', eindDatum:'2026-06-01', bmr:1770, eat:415, neat:350, tef:170 };

function getSettings() {
  const saved = JSON.parse(localStorage.getItem('gewichtSettings') || '{}');
  return { ...DEFAULTS, ...saved };
}

function getData() {
  const extra = JSON.parse(localStorage.getItem('gewichtExtra') || '[]');
  const merged = [...HISTORISCH];
  extra.forEach(e => { if (!merged.find(m => m.datum === e.datum)) merged.push(e); });
  return merged.sort((a, b) => a.datum.localeCompare(b.datum));
}

function getFiltered() {
  const all = getData();
  if (!filterDays) return all;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - filterDays);
  return all.filter(d => new Date(d.datum) >= cutoff);
}

function fmt(d) { const [y,m,day] = d.split('-'); return `${day}-${m}-${y}`; }

let filterDays = 0;
let weightChart, fatChart;

function setFilter(days) {
  filterDays = days;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.days) === days));
  render();
}

function renderStats() {
  const s = getSettings();
  const all = getData();
  const last = all[all.length - 1];
  const huidig = last.gewicht;
  const verloren = +(s.beginGewicht - huidig).toFixed(1);
  const nodig = +(huidig - s.streefGewicht).toFixed(1);
  const vandaag = new Date();
  const dagenOver = Math.max(0, Math.ceil((new Date(s.eindDatum) - vandaag) / 86400000));
  const tdee = s.bmr + s.eat + s.neat + s.tef;
  const gems = all.slice(-7).reduce((a, d) => a + d.gewicht, 0) / Math.min(7, all.length);

  const cards = [
    { label: 'Huidig gewicht', value: `${huidig} kg`, sub: fmt(last.datum), cls: 'green' },
    { label: 'Verloren', value: `${verloren} kg`, sub: `van ${s.beginGewicht} kg`, cls: 'green' },
    { label: 'Nog te gaan', value: `${nodig} kg`, sub: `doel: ${s.streefGewicht} kg`, cls: nodig < 5 ? 'green' : 'orange' },
    { label: 'Vet %', value: last.vet_perc ? `${last.vet_perc}%` : '-', sub: `doel: ${s.doelVet}%`, cls: 'blue' },
    { label: 'Dagen resterend', value: dagenOver, sub: `deadline: ${fmt(s.eindDatum)}`, cls: dagenOver < 30 ? 'orange' : 'orange' },
    { label: 'TDEE', value: `${tdee}`, sub: 'kcal/dag', cls: 'blue' },
    { label: '7-daags gem.', value: `${gems.toFixed(1)} kg`, sub: 'laatste week', cls: '' },
  ];

  document.getElementById('statsGrid').innerHTML = cards.map(c => `
    <div class="stat-card ${c.cls}">
      <div class="label">${c.label}</div>
      <div class="value">${c.value}</div>
      <div class="sub">${c.sub}</div>
    </div>`).join('');
}

function renderProgress() {
  const s = getSettings();
  const all = getData();
  const last = all[all.length - 1];
  const gwPct = Math.min(100, ((s.beginGewicht - last.gewicht) / (s.beginGewicht - s.streefGewicht)) * 100);
  const vetPct = last.vet_perc ? Math.min(100, ((s.beginVet - last.vet_perc) / (s.beginVet - s.doelVet)) * 100) : 0;
  const vandaag = new Date();
  const tijdPct = Math.min(100, ((vandaag - new Date(s.beginDatum)) / (new Date(s.eindDatum) - new Date(s.beginDatum))) * 100);

  document.getElementById('progressBars').innerHTML = [
    { label: 'Gewicht', pct: gwPct, color: '#2e8b57' },
    { label: 'Vet %', pct: vetPct, color: '#1a6fa8' },
    { label: 'Tijd', pct: tijdPct, color: '#c95d00' },
  ].map(b => `
    <div class="progress-row">
      <div class="progress-label">${b.label}</div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${b.pct.toFixed(1)}%;background:${b.color}"></div></div>
      <div class="progress-pct" style="color:${b.color}">${b.pct.toFixed(0)}%</div>
    </div>`).join('');
}

function renderCharts() {
  const s = getSettings();
  const data = getFiltered();
  const labels = data.map(d => fmt(d.datum));
  const chartDefaults = {
    responsive: true, maintainAspectRatio: true,
    plugins: { legend: { labels: { color: '#6b8a6b', font: { size: 11 }, boxWidth: 12 } } },
    scales: {
      x: { ticks: { color: '#6b8a6b', maxRotation: 45, font: { size: 10 }, maxTicksLimit: 10 }, grid: { color: 'rgba(208,228,208,.6)' } },
      y: { ticks: { color: '#6b8a6b', font: { size: 11 } }, grid: { color: 'rgba(208,228,208,.6)' } }
    }
  };

  if (weightChart) weightChart.destroy();
  weightChart = new Chart(document.getElementById('weightChart'), {
    type: 'line',
    data: { labels, datasets: [
      { label: 'Werkelijk', data: data.map(d => d.gewicht), borderColor: '#2e8b57', backgroundColor: 'rgba(46,139,87,.08)', tension: .3, pointRadius: 2, borderWidth: 2, fill: true },
      { label: 'Voorspeld', data: data.map(d => d.voorspeld), borderColor: '#1a6fa8', backgroundColor: 'transparent', tension: .3, pointRadius: 0, borderWidth: 1.5, borderDash: [5,4] },
      { label: 'Doel', data: data.map(() => s.streefGewicht), borderColor: '#c95d00', backgroundColor: 'transparent', pointRadius: 0, borderWidth: 1, borderDash: [3,6] },
    ]},
    options: { ...chartDefaults }
  });

  if (fatChart) fatChart.destroy();
  fatChart = new Chart(document.getElementById('fatChart'), {
    type: 'line',
    data: { labels, datasets: [
      { label: 'Vet %', data: data.map(d => d.vet_perc), borderColor: '#1a6fa8', backgroundColor: 'rgba(26,111,168,.08)', tension: .3, pointRadius: 2, borderWidth: 2, fill: true, spanGaps: true },
      { label: 'Doel', data: data.map(() => s.doelVet), borderColor: '#c95d00', backgroundColor: 'transparent', pointRadius: 0, borderWidth: 1, borderDash: [3,6] },
    ]},
    options: { ...chartDefaults }
  });
}

function renderTable() {
  const all = getData();
  document.getElementById('entryCount').textContent = `${all.length} metingen`;
  document.getElementById('tableBody').innerHTML = [...all].reverse().slice(0, 30).map(d => {
    const diff = d.voorspeld ? (d.gewicht - d.voorspeld).toFixed(2) : null;
    const badge = diff !== null
      ? `<span class="badge ${parseFloat(diff) <= 0 ? 'pos' : 'neg'}">${parseFloat(diff) > 0 ? '+' : ''}${diff}</span>`
      : '-';
    return `<tr><td>${fmt(d.datum)}</td><td><strong>${d.gewicht}</strong></td><td>${d.voorspeld ?? '-'}</td><td>${badge}</td><td>${d.vet_perc != null ? d.vet_perc + '%' : '-'}</td></tr>`;
  }).join('');
}

function render() { renderStats(); renderProgress(); renderCharts(); renderTable(); }

/* Meting modal */
function openMeting() {
  document.getElementById('inputDatum').value = new Date().toISOString().slice(0,10);
  document.getElementById('inputGewicht').value = '';
  document.getElementById('inputVet').value = '';
  document.getElementById('metingOverlay').classList.add('open');
}

function saveMeting() {
  const datum = document.getElementById('inputDatum').value;
  const gewicht = parseFloat(document.getElementById('inputGewicht').value);
  const vet = document.getElementById('inputVet').value ? parseFloat(document.getElementById('inputVet').value) : null;
  if (!datum || isNaN(gewicht)) { alert('Vul datum en gewicht in.'); return; }
  const extra = JSON.parse(localStorage.getItem('gewichtExtra') || '[]');
  const i = extra.findIndex(e => e.datum === datum);
  const entry = { datum, gewicht, voorspeld: null, vet_perc: vet };
  if (i >= 0) extra[i] = entry; else extra.push(entry);
  localStorage.setItem('gewichtExtra', JSON.stringify(extra));
  closeModal('metingOverlay');
  render();
}

/* Instellingen modal */
function updateTdeeDisplay() {
  const bmr = parseFloat(document.getElementById('sBmr').value) || 0;
  const eat = parseFloat(document.getElementById('sEat').value) || 0;
  const neat = parseFloat(document.getElementById('sNeat').value) || 0;
  const tef = parseFloat(document.getElementById('sTef').value) || 0;
  const tdee = bmr + eat + neat + tef;
  document.getElementById('tdeeDisplay').innerHTML = `
    <div class="tdee-row"><span>BMR (rustverbranding)</span><span>${bmr} kcal</span></div>
    <div class="tdee-row"><span>EAT (sport)</span><span>${eat} kcal</span></div>
    <div class="tdee-row"><span>NEAT (dagelijkse beweging)</span><span>${neat} kcal</span></div>
    <div class="tdee-row"><span>TEF (spijsvertering)</span><span>${tef} kcal</span></div>
    <div class="tdee-row total"><span>TDEE totaal</span><span>${tdee} kcal/dag</span></div>`;
}

function openInstellingen() {
  const s = getSettings();
  document.getElementById('sBeginGewicht').value = s.beginGewicht;
  document.getElementById('sStreefGewicht').value = s.streefGewicht;
  document.getElementById('sBeginVet').value = s.beginVet;
  document.getElementById('sDoelVet').value = s.doelVet;
  document.getElementById('sBeginDatum').value = s.beginDatum;
  document.getElementById('sEindDatum').value = s.eindDatum;
  document.getElementById('sBmr').value = s.bmr;
  document.getElementById('sEat').value = s.eat;
  document.getElementById('sNeat').value = s.neat;
  document.getElementById('sTef').value = s.tef;
  updateTdeeDisplay();
  ['sBmr','sEat','sNeat','sTef'].forEach(id => document.getElementById(id).addEventListener('input', updateTdeeDisplay));
  document.getElementById('instellingenOverlay').classList.add('open');
}

function saveInstellingen() {
  const settings = {
    beginGewicht: parseFloat(document.getElementById('sBeginGewicht').value),
    streefGewicht: parseFloat(document.getElementById('sStreefGewicht').value),
    beginVet: parseFloat(document.getElementById('sBeginVet').value),
    doelVet: parseFloat(document.getElementById('sDoelVet').value),
    beginDatum: document.getElementById('sBeginDatum').value,
    eindDatum: document.getElementById('sEindDatum').value,
    bmr: parseInt(document.getElementById('sBmr').value),
    eat: parseInt(document.getElementById('sEat').value),
    neat: parseInt(document.getElementById('sNeat').value),
    tef: parseInt(document.getElementById('sTef').value),
  };
  localStorage.setItem('gewichtSettings', JSON.stringify(settings));
  closeModal('instellingenOverlay');
  render();
}

function verwijderAlleData() {
  if (!confirm('Weet je zeker dat je alle extra metingen wilt verwijderen? De historische data (sep 2025 – feb 2026) blijft bewaard.')) return;
  localStorage.removeItem('gewichtExtra');
  closeModal('instellingenOverlay');
  render();
}

/* Shared modal helpers */
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeOnOutside(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }

render();
</script>
