<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#1a6b45" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Fitness" />
  <title>Fitness — gewicht, workouts &amp; voeding</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

<header>
  <div class="title">Fitness<span class="title-accent">.</span></div>
  <div class="actions">
    <span class="status" id="dbStatus">verbinden…</span>
    <button class="btn-ghost" onclick="openInstellingen()">Instellingen</button>
  </div>
</header>

<div id="view-home" class="tabview actief"></div>
<div id="view-gewicht" class="tabview"></div>
<div id="view-workout" class="tabview"></div>
<div id="view-voeding" class="tabview"></div>

<!-- Rusttimer -->
<div class="rust-bar" id="rustBar">
  <div class="rust-info">
    <div class="rust-label">Rust</div>
    <div class="rust-tijd" id="rustTijd">0:00</div>
    <div class="rust-track"><div class="rust-fill" id="rustFill"></div></div>
  </div>
  <button onclick="plusRust(15)">+15s</button>
  <button onclick="stopRust()">Stop</button>
</div>

<!-- Navigatie -->
<nav class="bottom-nav">
  <button class="nav-item active" data-tab="home" onclick="switchTab('home')">
    <svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
    Home
  </button>
  <button class="nav-item" data-tab="gewicht" onclick="switchTab('gewicht')">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M12 3a9 9 0 0 1 6.5 2.8L12 12Z"/></svg>
    Gewicht
  </button>
  <button class="nav-item" data-tab="workout" onclick="switchTab('workout')">
    <span class="nav-dot" id="navWorkoutDot"></span>
    <svg viewBox="0 0 24 24"><path d="M6.5 6.5v11M17.5 6.5v11M3 9v6M21 9v6M6.5 12h11"/></svg>
    Workout
  </button>
  <button class="nav-item" data-tab="voeding" onclick="switchTab('voeding')">
    <svg viewBox="0 0 24 24"><path d="M12 21c-5 0-8-3.5-8-8 0-3.5 2.5-6 6-6 1 0 1.6.2 2 .4.4-.2 1-.4 2-.4 3.5 0 6 2.5 6 6 0 4.5-3 8-8 8Z"/><path d="M12 7c0-2 1-3.5 3-4"/></svg>
    Voeding
  </button>
</nav>

<!-- Meting modal -->
<div class="overlay" id="metingOverlay" onclick="closeOnOutside(event,'metingOverlay')">
  <div class="dialog">
    <h2>Nieuwe meting</h2>
    <div class="field"><label>Datum</label><input type="date" id="inputDatum" /></div>
    <div class="field"><label>Gewicht (kg)</label><input type="number" id="inputGewicht" step="0.1" inputmode="decimal" placeholder="bv. 83.5" /></div>
    <div class="field"><label>Vet % (optioneel)</label><input type="number" id="inputVet" step="0.1" inputmode="decimal" placeholder="bv. 21.5" /></div>
    <div class="dialog-actions">
      <button class="btn-ghost" onclick="closeModal('metingOverlay')">Annuleren</button>
      <button class="btn-primary" id="btnSaveMeting" onclick="saveMeting()">Opslaan</button>
    </div>
  </div>
</div>

<!-- Instellingen modal -->
<div class="overlay" id="instellingenOverlay" onclick="closeOnOutside(event,'instellingenOverlay')">
  <div class="dialog wide">
    <h2>Instellingen</h2>
    <div class="section-label">Gewicht &amp; doelen</div>
    <div class="field-row">
      <div class="field"><label>Begingewicht (kg)</label><input type="number" id="sBeginGewicht" step="0.1" /></div>
      <div class="field"><label>Streefgewicht (kg)</label><input type="number" id="sStreefGewicht" step="0.1" /></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Begin vet %</label><input type="number" id="sBeginVet" step="0.1" /></div>
      <div class="field"><label>Doel vet %</label><input type="number" id="sDoelVet" step="0.1" /></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Begindatum</label><input type="date" id="sBeginDatum" /></div>
      <div class="field"><label>Einddatum</label><input type="date" id="sEindDatum" /></div>
    </div>
    <div class="section-label">Energieverbruik (TDEE)</div>
    <div class="field-row">
      <div class="field"><label>BMR (kcal)</label><input type="number" id="sBmr" /></div>
      <div class="field"><label>EAT — sport (kcal)</label><input type="number" id="sEat" /></div>
    </div>
    <div class="field-row">
      <div class="field"><label>NEAT — beweging</label><input type="number" id="sNeat" /></div>
      <div class="field"><label>TEF — spijsvertering</label><input type="number" id="sTef" /></div>
    </div>
    <div class="tdee-summary" id="tdeeDisplay"></div>
    <div class="section-label">Voedingsdoelen (per dag)</div>
    <div class="field-row">
      <div class="field"><label>Calorieën (kcal)</label><input type="number" id="sKcalDoel" /></div>
      <div class="field"><label>Eiwit (g)</label><input type="number" id="sEiwitDoel" /></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Koolhydraten (g)</label><input type="number" id="sKoolhDoel" /></div>
      <div class="field"><label>Vet (g)</label><input type="number" id="sVetDoel" /></div>
    </div>
    <div class="dialog-split">
      <button class="btn-danger" onclick="verwijderAlleData()">Verwijder alle metingen</button>
      <div style="display:flex;gap:8px">
        <button class="btn-ghost" onclick="closeModal('instellingenOverlay')">Annuleren</button>
        <button class="btn-primary" id="btnSaveSettings" onclick="saveInstellingen()">Opslaan</button>
      </div>
    </div>
  </div>
</div>

<!-- Oefening-picker modal -->
<div class="overlay" id="pickerOverlay" onclick="closeOnOutside(event,'pickerOverlay')">
  <div class="dialog wide">
    <h2>Oefening kiezen</h2>
    <div class="field picker-zoek"><input type="text" id="pickerZoek" placeholder="Zoek oefening…" oninput="pickerFilter(this.value)" /></div>
    <div class="chips" id="pickerChips"></div>
    <div class="picker-lijst" id="pickerLijst"></div>
    <div class="dialog-split">
      <button class="btn-ghost" onclick="openEigenOefening()">+ Eigen oefening</button>
      <div style="display:flex;gap:8px">
        <button class="btn-ghost" onclick="closeModal('pickerOverlay')">Annuleren</button>
        <button class="btn-primary" id="btnPickerVoegToe" onclick="pickerVoegToe()" disabled>Voeg toe</button>
      </div>
    </div>
  </div>
</div>

<!-- Eigen oefening modal -->
<div class="overlay" id="eigenOefOverlay" onclick="closeOnOutside(event,'eigenOefOverlay')">
  <div class="dialog">
    <h2>Eigen oefening</h2>
    <div class="field"><label>Naam</label><input type="text" id="eoNaam" placeholder="bv. Landmine Press" /></div>
    <div class="field"><label>Spiergroep</label>
      <select id="eoSpier">
        <option>Borst</option><option>Rug</option><option>Schouders</option><option>Biceps</option>
        <option>Triceps</option><option>Benen</option><option>Billen</option><option>Core</option>
        <option>Cardio</option><option>Overig</option>
      </select>
    </div>
    <div class="field"><label>Materiaal</label>
      <select id="eoMat">
        <option>Barbell</option><option>Dumbbell</option><option>Machine</option><option>Kabel</option>
        <option>Lichaamsgewicht</option><option>Overig</option>
      </select>
    </div>
    <div class="dialog-actions">
      <button class="btn-ghost" onclick="closeModal('eigenOefOverlay')">Annuleren</button>
      <button class="btn-primary" onclick="saveEigenOefening()">Opslaan</button>
    </div>
  </div>
</div>

<!-- Workout afronden modal -->
<div class="overlay" id="finishOverlay" onclick="closeOnOutside(event,'finishOverlay')">
  <div class="dialog">
    <h2>Workout afronden</h2>
    <div class="field"><label>Naam</label><input type="text" id="finishNaam" /></div>
    <div class="field"><label>Datum</label><input type="date" id="finishDatum" /></div>
    <div class="field"><label>Notitie (optioneel)</label><textarea id="finishNotitie" rows="3" placeholder="Hoe ging het?"></textarea></div>
    <div class="dialog-actions">
      <button class="btn-ghost" onclick="closeModal('finishOverlay')">Terug</button>
      <button class="btn-primary" id="btnSaveWorkout" onclick="saveWorkout()">Opslaan</button>
    </div>
  </div>
</div>

<!-- Oefening-detail modal -->
<div class="overlay" id="oefDetailOverlay" onclick="closeOnOutside(event,'oefDetailOverlay')">
  <div class="dialog wide">
    <h2 id="odTitel" style="margin-bottom:4px"></h2>
    <div class="card-meta" id="odSub" style="margin-bottom:18px"></div>
    <div class="stats-row" id="odRecords" style="margin-bottom:16px"></div>
    <div id="odChartWrap" style="display:none">
      <div class="section-label" style="margin-top:0">Geschat 1RM-verloop</div>
      <div class="chart-wrap" style="height:200px"><canvas id="odChart"></canvas></div>
    </div>
    <div class="section-label">Laatste sessies</div>
    <div id="odHistorie"></div>
    <div class="dialog-actions">
      <button class="btn-ghost" onclick="closeModal('oefDetailOverlay')">Sluiten</button>
    </div>
  </div>
</div>

<!-- Voeding toevoegen modal -->
<div class="overlay" id="voedingAddOverlay" onclick="closeOnOutside(event,'voedingAddOverlay')">
  <div class="dialog wide">
    <h2 id="vaTitel">Toevoegen</h2>

    <div id="vaStapZoek">
      <div class="field picker-zoek"><input type="text" id="vaZoek" placeholder="Zoek product…" oninput="vaZoekInput(this.value)" /></div>
      <div class="picker-lijst" id="vaLijst"></div>
      <div class="dialog-split">
        <button class="btn-ghost" onclick="vaNieuw()">+ Nieuw product</button>
        <button class="btn-ghost" onclick="closeModal('voedingAddOverlay')">Annuleren</button>
      </div>
    </div>

    <div id="vaStapGram" style="display:none">
      <div class="card-title" id="vaProdNaam" style="margin-bottom:14px"></div>
      <div class="field"><label>Hoeveelheid (gram / ml)</label><input type="number" id="vaGram" inputmode="decimal" oninput="vaUpdatePreview()" /></div>
      <div class="tdee-summary" id="vaPreview"></div>
      <div class="dialog-actions">
        <button class="btn-ghost" onclick="vaToonStap('zoek')">Terug</button>
        <button class="btn-primary" onclick="vaVoegToe()">Toevoegen</button>
      </div>
    </div>

    <div id="vaStapNieuw" style="display:none">
      <div class="field"><label>Naam</label><input type="text" id="vnNaam" placeholder="bv. Skyr aardbei" /></div>
      <div class="field-row">
        <div class="field"><label>Kcal per 100 g</label><input type="number" id="vnKcal" inputmode="decimal" /></div>
        <div class="field"><label>Eiwit per 100 g</label><input type="number" id="vnEiwit" inputmode="decimal" /></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Koolh. per 100 g</label><input type="number" id="vnKoolh" inputmode="decimal" /></div>
        <div class="field"><label>Vet per 100 g</label><input type="number" id="vnVet" inputmode="decimal" /></div>
      </div>
      <div class="field"><label>Hoeveelheid nu (gram / ml)</label><input type="number" id="vnGram" inputmode="decimal" /></div>
      <div class="field" style="display:flex;align-items:center;gap:8px">
        <input type="checkbox" id="vnBewaar" style="width:auto" />
        <label for="vnBewaar" style="margin:0">Bewaar in mijn producten</label>
      </div>
      <div class="dialog-actions">
        <button class="btn-ghost" onclick="vaToonStap('zoek')">Terug</button>
        <button class="btn-primary" onclick="vnVoegToe()">Toevoegen</button>
      </div>
    </div>
  </div>
</div>

<script src="js/db.js"></script>
<script src="js/exercises.js"></script>
<script src="js/gewicht.js"></script>
<script src="js/workout.js"></script>
<script src="js/stats.js"></script>
<script src="js/voeding.js"></script>
<script src="js/home.js"></script>
<script src="js/app.js"></script>
</body>
</html>
